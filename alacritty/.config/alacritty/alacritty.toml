[general]
live_config_reload = true
import = ["~/.config/alacritty/catppuccin-mocha.toml"]

[env]
TERM = "xterm-256color"

[font]
size = 20

[font.bold]
family = "DankMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "DankMono Nerd Font"
style = "Italic"

[font.glyph_offset]
x = 0
y = 8

[font.italic]
family = "DankMono Nerd Font"
style = "Italic"

[font.normal]
family = "DankMono Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 18

[[keyboard.bindings]]
chars = "\f"
key = "L"
mods = "Control"

[[keyboard.bindings]]
chars = "\u001Bj"
key = "J"
mods = "Alt|Option"

[[keyboard.bindings]]
chars = "\u001Bk"
key = "K"
mods = "Alt|Option"

[selection]
save_to_clipboard = true

[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 1.0

[window.padding]
x = 2
y = 0
